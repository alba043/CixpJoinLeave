# CixpJoinLeave Configuration
# Created by cixp

# Available placeholders:
# %player_name% - Player's username
# %luckperms_prefix% - LuckPerms prefix (if installed)
# %luckperms_suffix% - LuckPerms suffix (if installed)
# %player_displayname% - Player's display name
# %world% - Current world name

messages:
  join:
    enabled: true
    format: "&a&l+ &7%luckperms_prefix% &e%player_name% &ajoined the game"
    broadcast: true
    title:
      enabled: false
      title: "&aWelcome"
      subtitle: "&e%player_name%"
      fadeIn: 10
      stay: 70
      fadeOut: 20

  leave:
    enabled: true
    format: "&c&l- &7%luckperms_prefix% &e%player_name% &cleft the game"
    broadcast: true

  first-join:
    enabled: true
    format: "&b&l✦ &7%luckperms_prefix% &e%player_name% &bjoined for the first time!"
    broadcast: true

# Custom placeholder settings
custom-placeholders:
  enabled: true
  player-name-format: "&e%player_name%"

# Join/Leave sounds
sounds:
  join:
    enabled: false
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.0
  leave:
    enabled: false
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 0.5
    pitch: 0.5