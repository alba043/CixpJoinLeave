name: CixpJoinLeave
version: 1.0.0
main: com.cixp.joinleave.CixpJoinLeave
api-version: "1.21"
author: cixp
description: Custom join and leave messages with PlaceholderAPI support

softdepend: [PlaceholderAPI]

commands:
  cixpjoinleave:
    description: Main command for CixpJoinLeave plugin
    usage: /cixpjoinleave reload
    aliases: [cjl]

permissions:
  cixpjoinleave.reload:
    description: Allows reloading the plugin configuration
    default: op